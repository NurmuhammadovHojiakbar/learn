# Nginx as the edge for the Node + Redis stack (Lessons 04, 07, 08).
# Serves the static frontend and reverse-proxies /api/ to the Node app.

upstream api {
    server api:3000;          # "api" = the Compose service name
    keepalive 32;
}

# Rate limit zone: 10 req/s per client IP (Lesson 07)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name _;

    # --- security & hardening (Lesson 07) ---
    server_tokens off;
    client_max_body_size 10m;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # --- compression (Lesson 03) ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;

    # --- health endpoint for orchestrator probes ---
    location = /healthz {
        return 200 "ok\n";
        access_log off;
    }

    # --- API -> Node backend (Lesson 04) ---
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Connection        "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # --- static frontend with SPA fallback (Lesson 03) ---
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # block dotfiles like .git/.env (Lesson 07)
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }
}
