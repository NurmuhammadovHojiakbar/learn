# Nginx in front of a Node + Redis app (Lesson 08).
#   docker compose up -d
#   open http://localhost           -> static page served by Nginx
#   curl http://localhost/api/      -> proxied to Node, increments a Redis counter
#   curl http://localhost/healthz   -> Nginx health endpoint
#
# Note: only NGINX publishes a port. The api is internal-only (expose), reachable
# solely through Nginx over the Compose network — the production shape.

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./conf.d:/etc/nginx/conf.d:ro
      - ./html:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped

  api:
    build: ./node-app
    environment:
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    expose:
      - "3000"                       # internal only; not published to the host
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
