# Prometheus scrape + rules config (Lessons 04, 06).
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert.rules.yml

scrape_configs:
  - job_name: 'orders-api'
    static_configs:
      - targets: ['app:3000']          # the app service name in docker-compose

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']    # Prometheus scrapes itself
